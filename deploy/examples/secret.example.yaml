# ============================================================
# EXAMPLE ONLY — DO NOT COMMIT REAL VALUES
# ============================================================
# Copy this file to secret.yaml, fill in real values, apply it,
# then DELETE secret.yaml (never commit it to git).
#
# Generate a real AUTH_SECRET:
#   openssl rand -base64 32
#
# Generate VAPID keys:
#   npx web-push generate-vapid-keys
#
# Create the secret:
#   kubectl apply -f secret.yaml -n momo
#
# Alternatively, use a secrets manager (Sealed Secrets, External Secrets, Vault).
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: momo-secrets
  namespace: momo
  labels:
    app.kubernetes.io/name: momo
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # ── Database ─────────────────────────────────────────────
  DATABASE_URL: "postgresql://momo:CHANGE_ME@momo-postgres:5432/momo"

  # ── Auth.js ──────────────────────────────────────────────
  # Generate with: openssl rand -base64 32
  AUTH_SECRET: "CHANGE_ME_generate_with_openssl_rand_base64_32"

  # ── App URL ──────────────────────────────────────────────
  NEXT_PUBLIC_APP_URL: "https://momo.example.com"

  # ── GitHub OAuth (optional) ──────────────────────────────
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""

  # ── Discord OAuth (optional) ─────────────────────────────
  DISCORD_CLIENT_ID: ""
  DISCORD_CLIENT_SECRET: ""

  # ── Google OAuth (optional) ──────────────────────────────
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

  # ── Microsoft (private accounts only — optional) ─────────
  # Tenant pinned to "consumers" in lib/auth.ts — work / school /
  # Microsoft 365 accounts are intentionally not supported.
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""

  # ── OIDC (optional — Authentik, Keycloak, etc.) ──────────
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
  OIDC_ISSUER: ""

  # ── Web Push / VAPID ─────────────────────────────────────
  # Generate with: npx web-push generate-vapid-keys
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ""
  VAPID_PRIVATE_KEY: ""
  VAPID_CONTACT: "mailto:admin@example.com"

  # ── Cron job protection ───────────────────────────────────
  # Generate with: openssl rand -hex 32
  CRON_SECRET: ""
