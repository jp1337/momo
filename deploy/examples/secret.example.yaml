# ============================================================
# EXAMPLE ONLY — DO NOT COMMIT REAL VALUES
# ============================================================
# Copy this file to secret.yaml, fill in real values, apply it,
# then DELETE secret.yaml (never commit it to git).
#
# Generate a real AUTH_SECRET:
#   openssl rand -base64 32
#
# Generate VAPID keys:
#   npx web-push generate-vapid-keys
#
# Create the secret:
#   kubectl apply -f secret.yaml -n momo
#
# Alternatively, use a secrets manager (Sealed Secrets, External Secrets, Vault).
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: momo-secrets
  namespace: momo
  labels:
    app.kubernetes.io/name: momo
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # ── Database ─────────────────────────────────────────────
  DATABASE_URL: "postgresql://momo:CHANGE_ME@momo-postgres:5432/momo"

  # ── Auth.js ──────────────────────────────────────────────
  # Generate with: openssl rand -base64 32
  AUTH_SECRET: "CHANGE_ME_generate_with_openssl_rand_base64_32"

  # ── App URL ──────────────────────────────────────────────
  # NOTE: NEXT_PUBLIC_APP_URL is a Next.js "NEXT_PUBLIC_*" variable which is
  # inlined into the client bundle and pre-rendered HTML at *build* time.
  # Setting it here affects runtime-dynamic surfaces (sitemap.xml, robots.txt,
  # the iCal feed, WebAuthn RP ID, email links) but NOT the pre-rendered
  # Open Graph tags, JSON-LD, or canonical URLs embedded in the HTML output.
  #
  # For the SEO surfaces to match your domain, rebuild the container image
  # with the correct build-arg:
  #
  #   docker build --build-arg NEXT_PUBLIC_APP_URL=https://momo.example.com .
  #
  # The stock `ghcr.io/jp1337/momo` image is published with momotask.app baked
  # into the HTML — self-hosters SHOULD rebuild locally with their own URL.
  NEXT_PUBLIC_APP_URL: "https://momo.example.com"

  # ── GitHub OAuth (optional) ──────────────────────────────
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""

  # ── Discord OAuth (optional) ─────────────────────────────
  DISCORD_CLIENT_ID: ""
  DISCORD_CLIENT_SECRET: ""

  # ── Google OAuth (optional) ──────────────────────────────
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

  # ── Microsoft (private accounts only — optional) ─────────
  # Tenant pinned to "consumers" in lib/auth.ts — work / school /
  # Microsoft 365 accounts are intentionally not supported.
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""

  # ── OIDC (optional — Authentik, Keycloak, etc.) ──────────
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
  OIDC_ISSUER: ""

  # ── Web Push / VAPID ─────────────────────────────────────
  # Generate with: npx web-push generate-vapid-keys
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ""
  VAPID_PRIVATE_KEY: ""
  VAPID_CONTACT: "mailto:admin@example.com"

  # ── Cron job protection ───────────────────────────────────
  # Generate with: openssl rand -hex 32
  CRON_SECRET: ""

  # ── Two-factor authentication (TOTP) ─────────────────────
  # AES-256-GCM key for encrypting TOTP secrets at rest.
  # REQUIRED once any user enables 2FA, or when REQUIRE_2FA=true.
  # Must be exactly 64 hex characters (32 bytes).
  # Generate with: openssl rand -hex 32
  # WARNING: Rotating this key invalidates every existing TOTP
  # secret — every user would need to re-enroll their authenticator.
  TOTP_ENCRYPTION_KEY: ""

  # When "true", forces every user to register a second factor
  # (TOTP or Passkey) before they can access any protected route.
  # Existing users without a second factor are hard-locked to
  # /setup/2fa on next login. Disable buttons are hidden and
  # blocked server-side; removing the last remaining second factor
  # returns 403 SECOND_FACTOR_REQUIRED_BY_ADMIN.
  # See docs/two-factor-auth.md for operator recovery SQL.
  REQUIRE_2FA: "false"

  # ── Passkeys (WebAuthn) ──────────────────────────────────
  # Relying Party ID — must be the site's eTLD+1 hostname
  # (no scheme, no port, no path). Must match the host users
  # actually visit, otherwise every passkey assertion will fail.
  # Example: "momo.example.com"
  # Defaults to the hostname of NEXT_PUBLIC_APP_URL when empty.
  WEBAUTHN_RP_ID: ""

  # Display name shown in the OS / browser passkey prompt.
  # Purely cosmetic. Default: "Momo"
  WEBAUTHN_RP_NAME: "Momo"
