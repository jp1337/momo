apiVersion: batch/v1
kind: CronJob
metadata:
  name: momo-cron-dispatcher
  namespace: momo
  labels:
    app.kubernetes.io/name: momo
    app.kubernetes.io/component: cron
spec:
  # Run every 5 minutes — the server-side dispatcher handles per-job scheduling
  schedule: "*/5 * * * *"
  # Keep the last 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # Prevent overlapping runs if a job takes longer than expected
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # Retry once on failure
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: dispatcher
              # Minimal image — only needs curl
              image: curlimages/curl:8.7.1
              command:
                - sh
                - -c
                - |
                  HTTP_CODE=$(curl -s -o /tmp/cron-response.json -w "%{http_code}" \
                    -X POST \
                    -H "Authorization: Bearer ${CRON_SECRET}" \
                    "${APP_URL}/api/cron")
                  if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                    echo "cron dispatcher OK (HTTP $HTTP_CODE)"
                    cat /tmp/cron-response.json
                  else
                    echo "cron dispatcher FAILED (HTTP $HTTP_CODE)"
                    cat /tmp/cron-response.json
                    exit 1
                  fi
              env:
                - name: APP_URL
                  value: "https://momotask.app"
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: momo-secrets
                      key: CRON_SECRET
