  <path d="M6 44 C6 38 9 28 15 20 C21 12 30 7 38 6 C43 5 45 8 44 13 C42 22 34 32 24 38 C16 42 10 43 6 44 Z" fill="#f0a500"/>
  <!-- Shaft: darker line through center of vane -->
