  <!-- Barb separators left side -->
  <path d="M11 38 L6 32" stroke="#c07800" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M17 31 L11 24" stroke="#c07800" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M24 24 L18 17" stroke="#c07800" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Barb separators right side -->
  <path d="M11 38 L20 36" stroke="#c07800" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M17 31 L28 28" stroke="#c07800" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M24 24 L36 20" stroke="#c07800" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Quill tail curving down-left -->
  <path d="M6 44 C4 46 3 47 2 48" stroke="#f0a500" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
