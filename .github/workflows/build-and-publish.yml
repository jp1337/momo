name: Build & Publish

# Triggers on every push to main and on version tags (e.g. v1.2.3)
on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    # Explicitly limit token permissions — lint only needs read access
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # Cache node_modules keyed on package-lock.json — skip npm ci on exact hit.
      # Saves ~18 s on every commit that doesn't touch dependencies.
      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Run TypeScript check and ESLint in parallel — saves ~7 s.
      # Both PIDs are captured; script waits for both and exits non-zero if either fails.
      - name: Typecheck & Lint (parallel)
        run: |
          npx tsc --noEmit & PID_TSC=$!
          npm run lint      & PID_LINT=$!
          CODE=0
          wait $PID_TSC  || CODE=$?
          wait $PID_LINT || CODE=$((CODE + $?))
          exit $CODE

  # Build each platform natively in parallel to avoid slow QEMU emulation.
  # amd64 runs on a standard GitHub-hosted runner, arm64 on a native ARM runner.
  # Each job pushes the image by digest (no tag) to GHCR as a staging area,
  # then exports the digest as an artifact for the merge job.
  #
  # Lint runs in parallel with the build to avoid the ~1.5 min wait.
  # The merge job requires both lint and build to succeed before tagging.
  build:
    needs: []
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Derive a safe artifact/cache suffix from the platform name (e.g. linux-amd64)
      - name: Prepare platform suffix
        id: platform
        run: echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Authenticate with GitHub Container Registry — used as staging area for digests
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI labels (e.g. org.opencontainers.image.*) are attached at build time
      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/jp1337/momo

      # Build a single-platform image and push it by digest (no tag yet).
      # GHA cache is scoped per platform so the layers don't mix.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/jp1337/momo,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.suffix }}

      # Write an empty file named after the digest (without the "sha256:" prefix)
      # so the merge job can reconstruct the full digest reference.
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.platform.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 7

  # After both platform builds succeed, pull the two digests from GHCR and
  # create a multi-arch manifest list with proper semver/branch/sha tags
  # in all three registries. All three registry pushes run in parallel to
  # cut the merge step from ~30 s to ~10 s.
  merge:
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Map secrets to env vars — secrets context is not available in step `if` expressions,
    # but env context is. This is the only supported way to conditionally skip steps
    # based on whether a secret is configured.
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

    steps:
      # Download both digest artifacts into the same directory
      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Generate the final tags for all three registries
      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/jp1337/momo
            docker.io/kermit1337/momo
            quay.io/jp1337/momo
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Quay.io
        if: env.QUAY_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      # Push all three manifests in parallel — each registry push is independent.
      # GHCR always runs; DockerHub/Quay only when credentials are set.
      # Background PIDs are captured; the step fails if any push fails.
      - name: Push manifests to all registries (parallel)
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          push_ghcr() {
            # shellcheck disable=SC2046
            docker buildx imagetools create \
              $(jq -cr '.tags | map(select(startswith("ghcr.io")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
              $(printf 'ghcr.io/jp1337/momo@sha256:%s ' *)
          }

          push_dockerhub() {
            [[ -z "${DOCKERHUB_TOKEN:-}" ]] && return 0
            # shellcheck disable=SC2046
            docker buildx imagetools create \
              $(jq -cr '.tags | map(select(startswith("docker.io")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
              $(printf 'ghcr.io/jp1337/momo@sha256:%s ' *)
          }

          push_quay() {
            [[ -z "${QUAY_TOKEN:-}" ]] && return 0
            # shellcheck disable=SC2046
            docker buildx imagetools create \
              $(jq -cr '.tags | map(select(startswith("quay.io")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
              $(printf 'ghcr.io/jp1337/momo@sha256:%s ' *)
          }

          push_ghcr     & PID_GHCR=$!
          push_dockerhub & PID_DH=$!
          push_quay      & PID_QUAY=$!

          CODE=0
          wait $PID_GHCR || CODE=$?
          wait $PID_DH   || CODE=$((CODE + $?))
          wait $PID_QUAY || CODE=$((CODE + $?))
          exit $CODE

  # After the multi-arch manifest is published, trigger an immediate Watchtower update
  # on the intranet server so the new :latest image is rolled out without waiting for
  # the nightly schedule. Runs only on main-branch pushes (where :latest is updated).
  deploy:
    needs: [merge]
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, intranet]
    permissions: {}
    steps:
      - name: Trigger Watchtower update
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_API_TOKEN }}" \
            "http://watchtower:8085/v1/update?image=ghcr.io/jp1337/momo"
