name: Build & Publish

# Triggers on every push to main and on version tags (e.g. v1.2.3)
on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Buildx enables multi-platform builds (amd64 + arm64)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Authenticate with GitHub Container Registry using the automatic GITHUB_TOKEN
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate with Docker Hub — requires DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Authenticate with Quay.io — requires QUAY_USERNAME + QUAY_TOKEN secrets
      - name: Log in to Quay.io
        if: ${{ secrets.QUAY_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      # Generate image tags and OCI labels from Git metadata
      # Tags produced:
      #   - branch name (e.g. "main")
      #   - semver from tag (e.g. "1.2.3" and "1.2" from tag "v1.2.3")
      #   - short SHA prefix (e.g. "sha-abc1234")
      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            name=ghcr.io/jp1337/momo
            name=docker.io/jp1337/momo,enable=${{ secrets.DOCKERHUB_USERNAME != '' }}
            name=quay.io/jp1337/momo,enable=${{ secrets.QUAY_USERNAME != '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # Build multi-platform image and push to all three registries.
      # GitHub Actions cache is used to speed up subsequent builds.
      - name: Build and push to all registries
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
